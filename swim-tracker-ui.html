  return `${m}:${r}`;
};

<!-- ══════════════════════════════════════════
     CHROME — TierChip, StrokeDot, Sparkline,
              TierLadder, Sidebar, TopBar
     ══════════════════════════════════════════ -->
<script type="text/babel">
const { useState, useMemo } = React;

const TierChip = ({ tier, size = 'md' }) => {
  const t = SWIM.tiers.find(x => x.key === tier);
  if (!t) return null;
  const sizes = {
    sm: { fs: 9,  pad: '0 4px',   h: 13 },
    md: { fs: 10, pad: '1px 5px', h: 15 },
    lg: { fs: 12, pad: '2px 7px', h: 19 },
  }[size];
  return (
    <span className="tier-chip" style={{ background: t.color, color: t.fg, fontSize: sizes.fs, padding: sizes.pad, height: sizes.h, minWidth: sizes.h + 4 }}>
      {t.label}
    </span>
  );
};

const StrokeDot = ({ stroke, size = 8 }) => {
  const s = SWIM.strokes[stroke];
  return <span style={{ display:'inline-block', width:size, height:size, background:s.color, verticalAlign:'middle', marginRight:6, borderRadius: 1 }} />;
};

const Sparkline = ({ data, w = 80, h = 22, color = '#1A1D21', invert = true, fill = false }) => {
  if (!data || !data.length) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const rng = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * (w - 2) + 1;
    const norm = invert ? (max - v) / rng : (v - min) / rng;
    const y = h - 2 - norm * (h - 4) + 1;
    return [x, y];
  });
  const d = 'M ' + pts.map(p => p.join(',')).join(' L ');
  const area = d + ` L ${w-1},${h-1} L 1,${h-1} Z`;
  return (
    <svg width={w} height={h} style={{ display:'block' }}>
      {fill && <path d={area} fill={color} opacity="0.10" />}
      <path d={d} fill="none" stroke={color} strokeWidth="1.25" />
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="1.75" fill={color} />
    </svg>
  );
};

const TierLadder = ({ tier, next, progress, width = 220 }) => {
  const idx = SWIM.tierIdx(tier);
  const nextIdx = idx + 1;
  return (
    <div style={{ width, display:'flex', flexDirection:'column', gap:3 }}>
      <div style={{ display:'flex', height: 10 }}>
        {SWIM.tiers.map((t, i) => (
          <div key={t.key} style={{ flex:1, background: i <= idx ? t.color : '#EEF0F3', borderRight: i < SWIM.tiers.length-1 ? '1px solid #fff' : 'none', position:'relative' }}>
            {i === nextIdx && progress != null && (
              <div style={{ position:'absolute', left:0, top:0, bottom:0, width:`${Math.max(0,Math.min(100,progress))}%`, background:'repeating-linear-gradient(45deg, #B54A2E 0 3px, transparent 3px 6px)', opacity:0.7 }} />
            )}
          </div>
        ))}
      </div>
      <div style={{ display:'flex', fontFamily:'var(--mono)', fontSize:8.5, color:'var(--muted)', letterSpacing:'0.02em' }}>
        {SWIM.tiers.map(t => <div key={t.key} style={{ flex:1, textAlign:'center' }}>{t.label}</div>)}
      </div>
    </div>
  );
};

Object.assign(window, { TierChip, StrokeDot, Sparkline, TierLadder });
</script>

// ── Event Detail Drawer ──
const EventDetail = ({ ev, onClose }) => {
  const e = SWIM.events.find(x => x.ev === ev) || SWIM.events[0];
  const stroke = SWIM.strokes[e.stroke];
  const races = SWIM_EX.races50FR;
  const best = Math.min(...races.map(r => r.t));
  const worst = Math.max(...races.map(r => r.t));
  const W = 680, H = 200, padL = 42, padR = 12, padT = 12, padB = 22;
  const pts = races.map((r, i) => {
    const x = padL + (i/(races.length-1))*(W-padL-padR);
    const y = padT + ((r.t - best)/(worst - best))*(H-padT-padB);
    return { x, y, r };
  });
  const dPath = 'M ' + pts.map(p => `${p.x},${p.y}`).join(' L ');
  const tiersLines = [
    { key:'A',   t: 23.19 },
    { key:'AA',  t: 22.79 },
    { key:'AAA', t: 22.19 },
  ];

  return (
    <div style={{ position:'absolute', inset:0, background:'rgba(26,29,33,0.35)', display:'flex', justifyContent:'flex-end', zIndex:20, animation:'fadeIn .15s' }}>
      <div style={{ width:760, background:'#fff', borderLeft:'1px solid var(--line-strong)', display:'flex', flexDirection:'column', animation:'slide .2s ease-out' }}>
        <div style={{ padding:'12px 18px', borderBottom:'1px solid var(--line)', display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
          <StrokeDot stroke={e.stroke} size={10} />
          <div style={{ fontWeight:800, fontSize:18, letterSpacing:'-0.01em' }}>{e.ev}</div>
          <div className="mono" style={{ fontSize:10, color:'var(--muted)' }}>SCY · {stroke.name}</div>
          <div style={{ flex:1 }}/>
          <button className="btn" onClick={onClose}>Close ✕</button>
        </div>
        <div style={{ flex:1, overflow:'auto', padding:18, display:'flex', flexDirection:'column', gap:14 }}>
          {/* KPI row */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)', border:'1px solid var(--line)' }}>
            {[
              ['PB', fmtT(e.pb), 'var(--ink)'],
              ['TIER', e.tier, stroke.color],
              ['NEXT CUT', fmtT(e.next.cut), 'var(--muted)'],
              ['GAP', '−'+e.next.gap.toFixed(2)+'s', 'var(--signal)'],
              ['90d Δ', e.trend.toFixed(1)+'%', e.trend<0 ? 'var(--good)' : 'var(--signal)'],
            ].map(([k,v,c],i) => (
              <div key={k} style={{ padding:'10px 12px', borderRight: i<4 ? '1px solid var(--line)' : 'none' }}>
                <div className="kpi-label">{k}</div>
                <div className="mono" style={{ fontSize:18, color:c, fontWeight:500 }}>{v}</div>
              </div>
            ))}
          </div>

          {/* Chart */}
          <div>
            <div style={{ fontWeight:700, fontSize:12, marginBottom:6 }}>TIME PROGRESSION · {races.length} races</div>
            <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ border:'1px solid var(--line)' }}>
              {tiersLines.map(l => {
                const y = padT + ((l.t - best)/(worst - best))*(H-padT-padB);
                const tier = SWIM.tiers.find(t => t.key === l.key);
                return (
                  <g key={l.key}>
                    <line x1={padL} x2={W-padR} y1={y} y2={y} stroke={tier.color} strokeDasharray="3 3" strokeWidth="1"/>
                    <text x={W-padR-3} y={y-3} textAnchor="end" fontFamily="var(--mono)" fontSize="9" fill={tier.color}>{l.key} {fmtT(l.t)}</text>
                  </g>
                );
              })}
              <path d={dPath} fill="none" stroke={stroke.color} strokeWidth="1.5"/>
              {pts.map((p,i) => (
                <g key={i}>
                  <circle cx={p.x} cy={p.y} r={p.r.pb ? 4 : 2.5} fill={p.r.pb ? 'var(--signal)' : '#fff'} stroke={p.r.pb ? 'var(--signal)' : stroke.color} strokeWidth="1.5"/>
                  {p.r.pb && <text x={p.x} y={p.y-7} textAnchor="middle" fontFamily="var(--mono)" fontSize="8.5" fill="var(--signal)">{p.r.t.toFixed(2)}</text>}
                </g>
              ))}
              {pts.filter((_,i) => i%3===0).map((p,i) => (
                <text key={i} x={p.x} y={H-6} textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill="#9AA1AC">{p.r.date.slice(5)}</text>
              ))}
            </svg>
          </div>

          {/* Splits */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
            <div>
              <div style={{ fontWeight:700, fontSize:12, marginBottom:6 }}>SPLIT ANALYSIS · last race</div>
              {races[races.length-1].split.map((s,i) => (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'4px 0', borderBottom:'1px solid var(--line)', fontSize:12 }}>
                  <span className="mono" style={{ color:'var(--muted)' }}>{i===0 ? 'Front' : 'Back'} 25m</span>
                  <span className="mono" style={{ fontWeight:600 }}>{s.toFixed(2)}</span>
                </div>
              ))}
              <div style={{ display:'flex', justifyContent:'space-between', padding:'6px 0', fontSize:12, fontWeight:700 }}>
                <span>Total</span>
                <span className="mono">{fmtT(races[races.length-1].t)}</span>
              </div>
            </div>
            <div>
              <div style={{ fontWeight:700, fontSize:12, marginBottom:6 }}>QUICK STATS</div>
              {[
                ['Season races', races.length],
                ['PB swims', races.filter(r=>r.pb).length],
                ['Best place', Math.min(...races.map(r=>r.place))],
                ['Avg time', fmtT(races.reduce((s,r)=>s+r.t,0)/races.length)],
                ['Improvement', `${(races[0].t - races[races.length-1].t).toFixed(2)}s`],
              ].map(([k,v]) => (
                <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'4px 0', borderBottom:'1px solid var(--line)', fontSize:12 }}>
                  <span style={{ color:'var(--ink-2)' }}>{k}</span>
                  <span className="mono">{v}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Race log */}
          <div>
            <div style={{ fontWeight:700, fontSize:12, marginBottom:4 }}>RACE LOG</div>
            <table className="data">
              <thead>
                <tr><th>Date</th><th>Meet</th><th className="num">Time</th><th className="num">First 25</th><th className="num">Second 25</th><th>Tier</th><th className="num">Place</th><th>PB</th></tr>
              </thead>
              <tbody>
                {races.slice().reverse().map((r,i) => (
                  <tr key={i}>
                    <td className="mono" style={{ fontSize:11 }}>{r.date}</td>
                    <td>{r.meet}</td>
                    <td className="num" style={{ fontWeight:600 }}>{r.t.toFixed(2)}</td>
                    <td className="num muted">{r.split[0].toFixed(2)}</td>
                    <td className="num muted">{r.split[1].toFixed(2)}</td>
                    <td><TierChip tier={r.tier} size="sm"/></td>
                    <td className="num">{r.place}</td>
                    <td>{r.pb ? <span className="mono" style={{ color:'var(--signal)', fontSize:10, fontWeight:700 }}>PB</span> : ''}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Swim History ──
const SwimHistory = () => {
  const [filter, setFilter] = uS({ stroke:'ALL', pb:false, q:'' });
  const rows = uM(() => SWIM_EX.history.filter(r => {
    if (filter.stroke !== 'ALL' && strokeOf(r.event) !== filter.stroke) return false;
    if (filter.pb && !r.pb) return false;
    if (filter.q && !(r.event+r.meet).toLowerCase().includes(filter.q.toLowerCase())) return false;
    return true;
  }), [filter]);

  return (
    <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'10px 16px', borderBottom:'1px solid var(--line)', background:'#fff', display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>

          ))}

        <label style={{ display:'flex', alignItems:'center', gap:5, fontSize:11, color:'var(--ink-2)', cursor:'pointer', userSelect:'none' }}>

                <td className="mono" style={{ fontSize:11 }}>{r.date}</td>

                <td><StrokeDot stroke={strokeOf(r.event)} size={6}/>{r.event}</td>
                <td className="num" style={{ fontWeight: r.pb ? 700 : 500 }}>{fmtT(r.time)}</td>
                <td className="num">{r.place}</td>
                <td className="num muted">{r.heat}</td>
                <td className="mono muted" style={{ fontSize:10 }}>{r.course}</td>

              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ── IMX Score ──
const IMXScore = () => {
  const imx = SWIM.imx;
  const hist = SWIM_EX.imxHistory;
  const W = 580, H = 140, padL = 40, padR = 10, padT = 10, padB = 22;
  const maxS = 5000, minS = 2500;
  const pts = hist.map((h,i) => ({
    x: padL + (i/(hist.length-1))*(W-padL-padR),
    y: padT + (1-(h.score-minS)/(maxS-minS))*(H-padT-padB),
    h,
  }));

  return (
    <div style={{ flex:1, overflow:'auto', padding:16, display:'flex', flexDirection:'column', gap:12 }}>
      <div className="panel" style={{ padding:'18px 22px', display:'grid', gridTemplateColumns:'1fr 1.2fr', gap:28 }}>
        <div>
          <div className="kpi-label">IMX · 2025-26 SHORT COURSE YARDS</div>
          <div style={{ display:'flex', alignItems:'baseline', gap:10, marginTop:6 }}>
            <div className="mono" style={{ fontSize:72, fontWeight:500, letterSpacing:'-0.03em', lineHeight:1 }}>{imx.total.toLocaleString()}</div>
            <div className="mono" style={{ fontSize:14, color:'var(--muted)' }}>/ {imx.max.toLocaleString()}</div>
          </div>
          <div className="mono" style={{ fontSize:11, color:'var(--muted)', marginTop:6 }}>
            rank <span style={{ color:'var(--ink)', fontWeight:600 }}>{imx.rank.toLocaleString()}</span> of {imx.rankOf.toLocaleString()} · BOYS 15-16 · national
          </div>
          <div style={{ marginTop:14, position:'relative', height:16, background:'#F3F4F6', border:'1px solid var(--line)' }}>
            <div style={{ position:'absolute', left:0, top:0, bottom:0, width:`${(imx.total/maxS)*100}%`, background:'linear-gradient(to right, #C97A4A, #B54A2E)' }}/>
            {[1000,2000,3000,4000].map(v => (
              <div key={v} style={{ position:'absolute', left:`${(v/maxS)*100}%`, top:-2, bottom:-2, width:1, background:'var(--line-strong)' }}/>
            ))}
          </div>
          <div className="mono" style={{ display:'flex', justifyContent:'space-between', fontSize:9, color:'var(--muted)', marginTop:2 }}>
            <span>0</span><span>1k</span><span>2k</span><span>3k</span><span>4k</span><span>5k</span>
          </div>
        </div>
        <div style={{ borderLeft:'1px solid var(--line)', paddingLeft:28 }}>
          <div className="kpi-label">HISTORY · last 5 seasons</div>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ marginTop:6 }}>
            {[2500,3000,3500,4000,4500].map(v => {
              const y = padT + (1-(v-minS)/(maxS-minS))*(H-padT-padB);
              return (
                <g key={v}>
                  <line x1={padL} x2={W-padR} y1={y} y2={y} stroke="#F0F1F4" strokeWidth="1"/>
                  <text x={padL-4} y={y+3} textAnchor="end" fontFamily="var(--mono)" fontSize="9" fill="#9AA1AC">{v}</text>
                </g>
              );
            })}
            <path d={'M '+pts.map(p=>`${p.x},${p.y}`).join(' L ')} fill="none" stroke="var(--signal)" strokeWidth="1.8"/>
            <path d={'M '+pts.map(p=>`${p.x},${p.y}`).join(' L ')+` L ${pts[pts.length-1].x},${H-padB} L ${pts[0].x},${H-padB} Z`} fill="var(--signal)" opacity="0.08"/>
            {pts.map((p,i) => (
              <g key={i}>
                <circle cx={p.x} cy={p.y} r="3" fill="#fff" stroke="var(--signal)" strokeWidth="1.5"/>
                <text x={p.x} y={p.y-7} textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill="var(--ink)">{p.h.score}</text>
                <text x={p.x} y={H-6} textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill="#9AA1AC">{p.h.season.slice(0,7)}</text>
              </g>
            ))}
          </svg>
        </div>
      </div>

      <div className="panel">
        <div style={{ padding:'10px 14px', borderBottom:'1px solid var(--line)', display:'flex', alignItems:'center' }}>
          <div style={{ fontWeight:700, fontSize:12 }}>CONTRIBUTION BY EVENT</div>
          <div className="mono muted" style={{ fontSize:10, marginLeft:8 }}>best score per IMX event · max 1000 each</div>
        </div>
        <div style={{ padding:'14px 16px', display:'flex', flexDirection:'column', gap:10 }}>
          {imx.events.map(ev => {
            const s = strokeOf(ev.ev);
            return (
              <div key={ev.ev} style={{ display:'grid', gridTemplateColumns:'100px 1fr 60px 48px', alignItems:'center', gap:12 }}>
                <div style={{ fontSize:12, fontWeight:600 }}><StrokeDot stroke={s} size={7}/>{ev.ev}</div>
                <div style={{ position:'relative', height:16, background:'#F3F4F6', border:'1px solid var(--line)' }}>
                  <div style={{ position:'absolute', left:0, top:0, bottom:0, width:`${(ev.pts/1000)*100}%`, background:SWIM.strokes[s].color, opacity:0.85 }}/>
                  {[250,500,750].map(v => <div key={v} style={{ position:'absolute', left:`${v/10}%`, top:-1, bottom:-1, width:1, background:'rgba(255,255,255,0.6)' }}/>)}
                </div>
                <div className="mono" style={{ fontSize:14, textAlign:'right', fontWeight:600 }}>{ev.pts}</div>
                <div className="mono muted" style={{ fontSize:10, textAlign:'right' }}>{((ev.pts/1000)*100).toFixed(0)}%</div>
              </div>
            );
          })}
          <div style={{ display:'grid', gridTemplateColumns:'100px 1fr 60px 48px', alignItems:'center', gap:12, marginTop:4, paddingTop:10, borderTop:'1px solid var(--line)' }}>
            <div style={{ fontSize:12, fontWeight:700 }}>TOTAL</div>
            <div/>
            <div className="mono" style={{ fontSize:16, textAlign:'right', fontWeight:700, color:'var(--signal)' }}>{imx.total}</div>
            <div className="mono muted" style={{ fontSize:10, textAlign:'right' }}>{((imx.total/5000)*100).toFixed(0)}%</div>
          </div>
        </div>
      </div>

      <div className="panel" style={{ padding:'14px 18px' }}>
        <div style={{ fontWeight:700, fontSize:12, marginBottom:10 }}>SEASON-OVER-SEASON RANK</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:1, background:'var(--line)' }}>
          {hist.map(h => (
            <div key={h.season} style={{ background:'#fff', padding:'10px 12px', textAlign:'center' }}>
              <div className="mono" style={{ fontSize:9, color:'var(--muted)' }}>{h.season}</div>
              <div className="mono" style={{ fontSize:18, fontWeight:600, marginTop:4 }}>{h.score.toLocaleString()}</div>
              <div className="mono" style={{ fontSize:10, color:'var(--muted)', marginTop:2 }}>#{h.rank.toLocaleString()}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── Placeholder tabs ──
const PlaceholderTab = ({ name }) => (
  <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
    <div style={{ textAlign:'center' }}>
      <div className="mono" style={{ fontSize:10, letterSpacing:'0.14em', color:'var(--muted)' }}>TAB</div>
      <div style={{ fontWeight:800, fontSize:28, marginTop:4 }}>{name}</div>
      <div className="mono muted" style={{ fontSize:11, marginTop:8, lineHeight:1.6 }}>Coming in the next iteration.</div>
    </div>
  </div>
);

// ── Shell ──
const Shell = () => {
  const [tab, setTab] = uS('Stroke Overview');
  const [openEv, setOpenEv] = uS(null);
  return (
    <div style={{ width:'100%', flex:1, background:'var(--bg)', display:'flex', fontFamily:'var(--sans)', position:'relative', overflow:'hidden' }}>
      <SideNavV2 active={tab} onSelect={t => { setTab(t); setOpenEv(null); }}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <TopBar title={tab} />
        {tab === 'Stroke Overview' && <StrokeOverviewV2 onEvent={setOpenEv}/>}
        {tab === 'Quick Lookup'    && <QuickLookup onEvent={setOpenEv}/>}
        {tab === 'Swim History'    && <SwimHistory/>}
        {tab === 'IMX Score'       && <IMXScore/>}
        {!['Stroke Overview','Quick Lookup','Swim History','IMX Score'].includes(tab) && <PlaceholderTab name={tab}/>}
      </div>
      {openEv && <EventDetail ev={openEv} onClose={() => setOpenEv(null)}/>}
    </div>
  );
};

window.Shell = Shell;
</script>

<!-- ══════════════════════════════════════════
     MOBILE SUITE — 4 phone frames
     ══════════════════════════════════════════ -->
<script type="text/babel">
const { useState: mS } = React;

const MobileFrame = ({ label, children }) => (
  <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
    <div className="mono" style={{ fontSize:10, color:'var(--muted)', letterSpacing:'0.1em', textTransform:'uppercase' }}>{label}</div>
    <div style={{ width:360, height:760, background:'var(--bg)', fontFamily:'var(--sans)', display:'flex', flexDirection:'column', overflow:'hidden', border:'1px solid var(--line-strong)', borderRadius:28, padding:8, boxShadow:'0 4px 24px rgba(26,29,33,0.08)' }}>
      <div style={{ flex:1, background:'#fff', borderRadius:22, overflow:'hidden', display:'flex', flexDirection:'column' }}>{children}</div>
    </div>
  </div>
);
const MStatus = () => (
  <div style={{ height:36, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 18px', flexShrink:0 }}>
    <div className="mono" style={{ fontSize:12, fontWeight:700 }}>9:41</div>
    <div className="mono" style={{ fontSize:10, color:'var(--muted)' }}>●●●●● 5G</div>
  </div>
);
const MHeader = ({ title }) => (
  <div style={{ padding:'6px 14px 10px', borderBottom:'1px solid var(--line)', flexShrink:0 }}>
    <div className="mono" style={{ fontSize:9, color:'var(--muted)', letterSpacing:'0.14em' }}>SWIMTRACKER · SCY</div>
    <div style={{ fontWeight:800, fontSize:18, marginTop:2, letterSpacing:'-0.01em' }}>{title}</div>
  </div>
);
const MTabBar = ({ active = 'Strokes' }) => (
  <div style={{ height:52, background:'#fff', borderTop:'1px solid var(--line)', display:'grid', gridTemplateColumns:'repeat(5,1fr)', padding:'4px 0', flexShrink:0 }}>
    {['Strokes','Search','History','IMX','Goals'].map(t => (
      <div key={t} style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:2, color: t===active ? 'var(--signal)' : 'var(--muted)' }}>
        <div style={{ width:16, height:16, background: t===active ? 'var(--signal)' : 'var(--muted-2)', opacity: t===active ? 1 : 0.4, borderRadius:2 }}/>
        <div style={{ fontSize:9, fontWeight: t===active ? 700 : 500 }}>{t}</div>
      </div>
    ))}
  </div>
);

const MOverview = () => {
  const priority = [...SWIM.events].sort((a,b) => a.next.gap - b.next.gap);
  const hero = priority[0];
  const TierLadderMobile = ({ tier, next, pb, nextCut }) => {
    const idx = SWIM.tierIdx(tier);
    const nextIdx = idx + 1;
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
        <div style={{ display:'flex', height:12, border:'1px solid var(--line)', position:'relative' }}>
          {SWIM.tiers.map((t, i) => (
            <div key={t.key} style={{ flex:1, background: i <= idx ? t.color : (i===nextIdx ? `${t.color}44` : '#F3F4F6'), borderRight: i < SWIM.tiers.length-1 ? '1px solid #fff' : 'none' }} />
          ))}
          <div style={{ position:'absolute', left:`${((idx+1)/SWIM.tiers.length)*100 - 1}%`, top:-2, bottom:-2, width:2, background:'var(--ink)' }} />
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', fontFamily:'var(--mono)', fontSize:9, color:'var(--muted)' }}>
          <span>{fmtT(pb)}</span><span style={{ color:'var(--signal)' }}>→ {fmtT(nextCut)}</span>
        </div>
      </div>
    );
  };
  return (
    <MobileFrame label="01 · Stroke Overview">
      <MStatus/>
      <MHeader title="Stroke Overview"/>
      <div style={{ flex:1, overflow:'auto', padding:10, display:'flex', flexDirection:'column', gap:8 }}>
        <div className="panel" style={{ padding:'12px 14px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <StrokeDot stroke={hero.stroke} size={8}/>
            <div style={{ fontWeight:700, fontSize:13 }}>{hero.ev}</div>
            <div style={{ flex:1 }}/>
            <TierChip tier={hero.tier} size="sm"/><span className="mono muted" style={{ fontSize:10 }}>→</span><TierChip tier={hero.next.tier}/>
          </div>
          <div className="kpi-label" style={{ marginTop:8 }}>NEXT CUT</div>
          <div style={{ display:'flex', alignItems:'baseline', gap:4, marginTop:2 }}>
            <div className="mono" style={{ fontSize:48, fontWeight:500, letterSpacing:'-0.03em', lineHeight:1, color:'var(--signal)' }}>−{hero.next.gap.toFixed(2)}</div>
            <div className="mono" style={{ fontSize:13, color:'var(--muted)' }}>s</div>
          </div>
          <div className="mono" style={{ fontSize:10, color:'var(--muted)', marginTop:4 }}>PB {fmtT(hero.pb)} · cut {fmtT(hero.next.cut)}</div>
          <div style={{ marginTop:10 }}><TierLadderMobile tier={hero.tier} next={hero.next.tier} pb={hero.pb} nextCut={hero.next.cut}/></div>
        </div>
        {priority.slice(1,6).map(e => {
          const pct = Math.max(5, Math.min(95, 100 - (e.next.gap / (e.pb * 0.04)) * 100));
          return (
            <div key={e.ev} className="panel" style={{ padding:'9px 12px' }}>
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                <StrokeDot stroke={e.stroke} size={7}/>
                <div style={{ fontWeight:600, fontSize:12 }}>{e.ev}</div>
                <TierChip tier={e.tier} size="sm"/>
                <div style={{ flex:1 }}/>
                <div className="mono" style={{ fontSize:13, color:'var(--signal)', fontWeight:600 }}>−{e.next.gap.toFixed(2)}</div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:6 }}>
                <div style={{ flex:1, position:'relative', height:5, background:'#EEF0F3' }}>
                  <div style={{ position:'absolute', left:0, top:0, bottom:0, width:`${pct}%`, background: SWIM.strokes[e.stroke].color }}/>
                </div>
                <div className="mono" style={{ fontSize:10, color:'var(--muted)' }}>{fmtT(e.pb)}</div>
              </div>
            </div>
          );
        })}
      </div>
      <MTabBar active="Strokes"/>
    </MobileFrame>
  );
};

const MEventDetail = () => {
  const e = SWIM.events[0];
  const races = SWIM_EX.races50FR.slice(-8);
  const best = Math.min(...races.map(r => r.t));
  const worst = Math.max(...races.map(r => r.t));
  const W=320,H=100,padL=28,padR=6,padT=8,padB=20;
  return (
    <MobileFrame label="02 · Event Detail">
      <MStatus/>
      <div style={{ padding:'6px 14px 10px', borderBottom:'1px solid var(--line)', flexShrink:0 }}>
        <div className="mono" style={{ fontSize:10, color:'var(--signal)' }}>← Stroke Overview</div>
        <div style={{ display:'flex', alignItems:'baseline', gap:8, marginTop:2 }}>
          <StrokeDot stroke={e.stroke} size={9}/>
          <div style={{ fontWeight:800, fontSize:20 }}>{e.ev}</div>
          <div className="mono muted" style={{ fontSize:11 }}>SCY</div>
        </div>
      </div>
      <div style={{ flex:1, overflow:'auto', padding:10, display:'flex', flexDirection:'column', gap:10 }}>
        <div className="panel" style={{ padding:'10px 12px' }}>
          <div className="kpi-label">CURRENT PB</div>
          <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
            <div className="mono" style={{ fontSize:36, fontWeight:500, letterSpacing:'-0.02em', lineHeight:1 }}>{fmtT(e.pb)}</div>
            <TierChip tier={e.tier}/>
          </div>
          <div className="mono muted" style={{ fontSize:10, marginTop:2 }}>Apr 11 · Spring Champs</div>
          <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:3 }}>
            <div style={{ display:'flex', height:12, border:'1px solid var(--line)', position:'relative' }}>
              {SWIM.tiers.map((t, i) => {
                const idx = SWIM.tierIdx(e.tier);
                return <div key={t.key} style={{ flex:1, background: i<=idx ? t.color : '#F3F4F6', borderRight: i<SWIM.tiers.length-1 ? '1px solid #fff':'' }}/>;
              })}
            </div>
            <div className="mono" style={{ fontSize:9, color:'var(--muted)', display:'flex', justifyContent:'space-between' }}>
              <span>{fmtT(e.pb)}</span><span style={{color:'var(--signal)'}}>→ {fmtT(e.next.cut)}</span>
            </div>
          </div>
        </div>
        <div className="panel" style={{ padding:'10px 12px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <div style={{ fontWeight:700, fontSize:11 }}>PROGRESSION</div>
            <div className="mono muted" style={{ fontSize:9 }}>last 8 races</div>
          </div>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ marginTop:4 }}>
            {[{k:'AA',t:22.79},{k:'AAA',t:22.19}].map(l => {
              const y = padT + ((l.t-best)/(worst-best+0.01))*(H-padT-padB);
              const tier = SWIM.tiers.find(t=>t.key===l.k);
              return (<g key={l.k}>
                <line x1={padL} x2={W-padR} y1={y} y2={y} stroke={tier.color} strokeDasharray="2 2"/>
                <text x={W-padR-2} y={y-2} textAnchor="end" fontFamily="var(--mono)" fontSize="8" fill={tier.color}>{l.k}</text>
              </g>);
            })}
            {races.map((r,i,arr) => {
              const x = padL + (i/(arr.length-1))*(W-padL-padR);
              const y = padT + ((r.t-best)/(worst-best+0.01))*(H-padT-padB);
              const prev = i>0 ? arr[i-1] : null;
              const px = prev ? padL + ((i-1)/(arr.length-1))*(W-padL-padR) : null;
              const py = prev ? padT + ((prev.t-best)/(worst-best+0.01))*(H-padT-padB) : null;
              return (<g key={i}>
                {prev && <line x1={px} y1={py} x2={x} y2={y} stroke={SWIM.strokes.FR.color} strokeWidth="1.3"/>}
                <circle cx={x} cy={y} r={r.pb ? 3 : 2} fill={r.pb ? 'var(--signal)' : '#fff'} stroke={r.pb ? 'var(--signal)' : SWIM.strokes.FR.color} strokeWidth="1.3"/>
              </g>);
            })}
          </svg>
        </div>
        <div className="panel">
          <div style={{ padding:'8px 12px', borderBottom:'1px solid var(--line)', fontWeight:700, fontSize:11 }}>RECENT RACES</div>
          {races.slice().reverse().slice(0,5).map((r,i) => (
            <div key={i} style={{ padding:'7px 12px', borderBottom: i<4 ? '1px solid var(--line)' : 'none', display:'grid', gridTemplateColumns:'60px 1fr 48px 28px', alignItems:'center', gap:6 }}>
              <div className="mono" style={{ fontSize:10, color:'var(--muted)' }}>{r.date.slice(5)}</div>
              <div style={{ fontSize:11 }}>{r.meet}</div>
              <div className="mono" style={{ fontSize:12, fontWeight:600, textAlign:'right' }}>{r.t.toFixed(2)}</div>
              <div style={{ textAlign:'right' }}>{r.pb && <span className="mono" style={{ color:'var(--signal)', fontSize:9, fontWeight:700 }}>PB</span>}</div>
            </div>
          ))}
        </div>
      </div>
      <MTabBar active="Strokes"/>
    </MobileFrame>
  );
};

const MIMX = () => (
  <MobileFrame label="03 · IMX Score">
    <MStatus/>
    <MHeader title="IMX Score"/>
    <div style={{ flex:1, overflow:'auto', padding:10, display:'flex', flexDirection:'column', gap:10 }}>
      <div className="panel" style={{ padding:'14px 14px' }}>
        <div className="kpi-label">2025-26 SCY</div>
        <div style={{ display:'flex', alignItems:'baseline', gap:6, marginTop:4 }}>
          <div className="mono" style={{ fontSize:56, fontWeight:500, letterSpacing:'-0.03em', lineHeight:1 }}>{SWIM.imx.total.toLocaleString()}</div>
          <div className="mono" style={{ fontSize:13, color:'var(--muted)' }}>/ 5000</div>
        </div>
        <div className="mono muted" style={{ fontSize:10, marginTop:4 }}>rank {SWIM.imx.rank.toLocaleString()} of {SWIM.imx.rankOf.toLocaleString()} · national</div>
        <div style={{ marginTop:12, position:'relative', height:12, background:'#F3F4F6', border:'1px solid var(--line)' }}>
          <div style={{ position:'absolute', left:0, top:0, bottom:0, width:`${(SWIM.imx.total/5000)*100}%`, background:'linear-gradient(to right, #C97A4A, #B54A2E)' }}/>
        </div>
        <div className="mono" style={{ display:'flex', justifyContent:'space-between', fontSize:9, color:'var(--muted)', marginTop:2 }}>
          <span>0</span><span>1k</span><span>2k</span><span>3k</span><span>4k</span><span>5k</span>
        </div>
      </div>
      <div className="panel">
        <div style={{ padding:'8px 12px', borderBottom:'1px solid var(--line)', fontWeight:700, fontSize:11 }}>CONTRIBUTION</div>
        <div style={{ padding:'10px 12px', display:'flex', flexDirection:'column', gap:8 }}>
          {SWIM.imx.events.map(ev => {
            const sk = strokeOf(ev.ev);
            return (
              <div key={ev.ev} style={{ display:'grid', gridTemplateColumns:'64px 1fr 38px', alignItems:'center', gap:8 }}>
                <div style={{ fontSize:11, fontWeight:600 }}><StrokeDot stroke={sk} size={6}/>{ev.ev}</div>
                <div style={{ position:'relative', height:10, background:'#F3F4F6' }}>
                  <div style={{ position:'absolute', left:0, top:0, bottom:0, width:`${(ev.pts/1000)*100}%`, background:SWIM.strokes[sk].color, opacity:0.85 }}/>
                </div>
                <div className="mono" style={{ fontSize:11, textAlign:'right', fontWeight:600 }}>{ev.pts}</div>
              </div>
            );
          })}
        </div>
      </div>
      <div className="panel" style={{ padding:'10px 12px' }}>
        <div className="kpi-label">5-SEASON TREND</div>
        <Sparkline data={SWIM_EX.imxHistory.map(h => -h.score)} w={320} h={48} color="var(--signal)" fill/>
        <div className="mono muted" style={{ fontSize:9, marginTop:4, display:'flex', justifyContent:'space-between' }}>
          <span>2023-24 · 2680</span><span>now · 3,482</span>
        </div>
      </div>
    </div>
    <MTabBar active="IMX"/>
  </MobileFrame>
);

const MHistory = () => {
  const rows = SWIM_EX.history.slice(0, 14);
  return (
    <MobileFrame label="04 · Swim History">
      <MStatus/>
      <MHeader title="Swim History"/>
      <div style={{ padding:'8px 10px', borderBottom:'1px solid var(--line)', display:'flex', gap:4, overflowX:'auto', flexShrink:0 }}>
        {['ALL','FR','BK','BR','FL','IM','PBs'].map(s => (
          <button key={s} className={'btn '+(s==='ALL'?'active':'')} style={{ padding:'3px 10px', fontSize:10, whiteSpace:'nowrap' }}>{s}</button>
        ))}
      </div>
      <div style={{ flex:1, overflow:'auto' }}>
        {rows.map((r,i) => (
          <div key={r.id} style={{ padding:'8px 12px', borderBottom:'1px solid var(--line)', background: r.pb ? '#FFF6F3' : '#fff', display:'grid', gridTemplateColumns:'1fr 60px', gap:4 }}>
            <div>
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                <StrokeDot stroke={strokeOf(r.event)} size={6}/>
                <div style={{ fontWeight:600, fontSize:12 }}>{r.event}</div>
                {r.pb && <span className="mono" style={{ color:'var(--signal)', fontSize:9, fontWeight:700 }}>PB</span>}
              </div>
              <div className="mono" style={{ fontSize:10, color:'var(--muted)', marginTop:2 }}>{r.date} · {r.meet}</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div className="mono" style={{ fontSize:14, fontWeight: r.pb ? 700 : 500 }}>{fmtT(r.time)}</div>
              <div className="mono" style={{ fontSize:9, color:'var(--muted)' }}>pl {r.place}</div>
            </div>
          </div>
        ))}
      </div>
      <MTabBar active="History"/>
    </MobileFrame>
  );
};

const MobileSuite = () => (
  <div style={{ padding:28, background:'var(--bg)', display:'flex', gap:24, flexWrap:'wrap', minHeight:'100%' }}>
    <MOverview/>
    <MEventDetail/>
    <MIMX/>
    <MHistory/>
  </div>
);

window.MobileSuite = MobileSuite;
</script>

<!-- ══════════════════════════════════════════
     APP ENTRY POINT — view toggle
     ══════════════════════════════════════════ -->
<script type="text/babel">
const App = () => {
  const [view, setView] = React.useState('desktop');
  return (
    <div style={{ height:'100vh', display:'flex', flexDirection:'column', background:'var(--bg)' }}>
      {/* App chrome — view switcher */}
      <div style={{ flexShrink:0, height:40, background:'var(--ink)', display:'flex', alignItems:'center', gap:0, padding:'0 14px', borderBottom:'1px solid var(--signal-2)' }}>
        <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'rgba(255,255,255,0.5)', letterSpacing:'0.14em', marginRight:16 }}>SWIMTRACKER</div>
        <div style={{ color:'rgba(255,255,255,0.9)', fontWeight:700, fontSize:12, marginRight:'auto' }}>Jack Kirby · 2025–26 SC</div>
        <div style={{ display:'flex', gap:0, border:'1px solid rgba(255,255,255,0.2)' }}>
          {[['desktop','Desktop'],['mobile','Mobile']].map(([key,label]) => (
            <button key={key} onClick={() => setView(key)}
              style={{ border:'none', borderRight: key==='desktop' ? '1px solid rgba(255,255,255,0.2)' : 'none', padding:'0 14px', height:28, cursor:'pointer', fontFamily:'var(--sans)', fontSize:11, fontWeight: view===key ? 700 : 400,
                background: view===key ? 'rgba(255,255,255,0.15)' : 'transparent',
                color: view===key ? '#fff' : 'rgba(255,255,255,0.55)',
              }}>{label}</button>
          ))}
        </div>
      </div>

      {/* Content */}
      {view === 'desktop'
        ? <Shell />
        : <div style={{ flex:1, overflow:'auto' }}><MobileSuite /></div>
      }
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
