<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Swim Tracker</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#FAFAFA;--panel:#FFFFFF;--panel-alt:#F5F6F7;--line:#E4E6EA;
  --line-strong:#CDD1D7;--ink:#1A1D21;--ink-2:#3D434B;--muted:#6B7280;
  --muted-2:#9AA1AC;--signal:#B54A2E;--signal-2:#8B2817;--good:#2F7A4D;
  --sans:'Inter',-apple-system,system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--bg);height:100%}
body{font-size:13px;-webkit-font-smoothing:antialiased}
#root{height:100vh;display:flex;flex-direction:column}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
.panel{background:var(--panel);border:1px solid var(--line)}
.muted{color:var(--muted)}
.kpi-label{font-size:9.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:600}
.tier-chip{display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:10px;padding:1px 5px;line-height:1.3;letter-spacing:0.02em}
.btn{font:11px var(--sans);color:var(--ink-2);background:var(--panel);border:1px solid var(--line-strong);padding:4px 9px;cursor:pointer}
.btn:hover{background:var(--panel-alt)}
.btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-strong)}
::-webkit-scrollbar-thumb:hover{background:var(--muted-2)}
table.data{width:100%;border-collapse:collapse}
table.data th{font-size:9.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:600;text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);background:var(--panel-alt);position:sticky;top:0;z-index:1}
table.data td{font-size:12px;padding:5px 8px;border-bottom:1px solid var(--line)}
table.data tr:hover td{background:#FCFCFD}
table.data td.num,table.data th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
@keyframes slide{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ev-cell{background:#fff;transition:background 0.08s}
.ev-cell.has-data{cursor:pointer}
.ev-cell.has-data:hover{background:#F5F6F7}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useContext, createContext } = React;

// ─── Formatters ───────────────────────────────────────────────────────────────
const fmtT = (s) => {
  if (s == null || s === '') return '—';
  s = parseFloat(s);
  if (isNaN(s)) return '—';
  if (s < 60) return s.toFixed(2);
  const m = Math.floor(s / 60);
  return `${m}:${(s - m * 60).toFixed(2).padStart(5, '0')}`;
};
const fmtDate = (d) => d ? d.slice(0, 7) : '—';

// ─── Data context ─────────────────────────────────────────────────────────────
const DataCtx = createContext(null);
const useData = () => useContext(DataCtx);

// ─── Shared atoms ─────────────────────────────────────────────────────────────
const TierChip = ({ tier, size = 'md' }) => {
  const SD = useData();
  const t = SD.tiers.find(x => x.key === tier);
  if (!t) return null;
  const sz = { sm:{fs:9,pad:'0 4px',h:13}, md:{fs:10,pad:'1px 5px',h:15}, lg:{fs:12,pad:'2px 7px',h:19} }[size];
  return <span className="tier-chip" style={{background:t.color,color:t.fg,fontSize:sz.fs,padding:sz.pad,height:sz.h,minWidth:sz.h+4}}>{t.label}</span>;
};

const StrokeDot = ({ stroke, size = 8 }) => {
  const SD = useData();
  const s = SD.strokes[stroke];
  if (!s) return null;
  return <span style={{display:'inline-block',width:size,height:size,background:s.color,verticalAlign:'middle',marginRight:6,borderRadius:1}}/>;
};

const Sparkline = ({ data, w=80, h=22, color='#1A1D21', fill=false }) => {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data), rng = max - min || 0.01;
  const pts = data.map((v,i) => [
    (i/(data.length-1))*(w-2)+1,
    h-2-((max-v)/rng)*(h-4)+1
  ]);
  const d = 'M '+pts.map(p=>p.join(',')).join(' L ');
  return (
    <svg width={w} height={h} style={{display:'block'}}>
      {fill && <path d={d+` L ${w-1},${h-1} L 1,${h-1} Z`} fill={color} opacity="0.10"/>}
      <path d={d} fill="none" stroke={color} strokeWidth="1.25"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="1.75" fill={color}/>
    </svg>
  );
};

const TierLadderV2 = ({ tier, pb, nextCut, width='100%' }) => {
  const SD = useData();
  const idx = SD.tiers.findIndex(t => t.key === tier);
  return (
    <div style={{width,display:'flex',flexDirection:'column',gap:3}}>
      <div style={{display:'flex',height:14,border:'1px solid var(--line)',position:'relative'}}>
        {SD.tiers.map((t,i) => (
          <div key={t.key} style={{
            flex:1,
            background: i<=idx ? t.color : (i===idx+1 ? `${t.color}44` : '#F3F4F6'),
            borderRight: i<SD.tiers.length-1 ? '1px solid #fff' : 'none',
            position:'relative',
          }}>
            {i<=idx && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:t.fg,fontSize:9,fontFamily:'var(--mono)',fontWeight:700}}>{t.label}</div>}
            {i===idx+1 && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--signal)',fontSize:9,fontFamily:'var(--mono)',fontWeight:700}}>{t.label}</div>}
          </div>
        ))}
        {idx >= 0 && <div style={{position:'absolute',left:`${((idx+1)/SD.tiers.length)*100-1}%`,top:-3,bottom:-3,width:2,background:'var(--ink)'}}/>}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)'}}>
        <span>PB <span style={{color:'var(--ink)'}}>{fmtT(pb)}</span></span>
        {nextCut && <span>next <span style={{color:'var(--signal)'}}>{fmtT(nextCut)}</span></span>}
      </div>
    </div>
  );
};

const strokeOf = ev => {
  if (!ev) return 'FR';
  if (ev.includes('IM'))  return 'IM';
  if (ev.includes('FL'))  return 'FL';
  if (ev.includes('BK'))  return 'BK';
  if (ev.includes('BR'))  return 'BR';
  return 'FR';
};

// ─── Navigation ───────────────────────────────────────────────────────────────
const TABS = ['Stroke Overview','Quick Lookup','Swim History','Deep Analytics','IMX Score','Goals','Data Guide','Settings'];

// ─── Countdown widget (sidebar) ───────────────────────────────────────────────
const MeetCountdown = () => {
  const SD = useData();
  const meet = SD.nextMeet;
  if (!meet) return null;

  const days = meet.daysAway;
  const urgent = days <= 1;
  const soon   = days <= 7;
  const accentColor = urgent ? 'var(--signal)' : soon ? '#B77A2B' : 'var(--muted)';
  const bgColor     = urgent ? '#FFF5F3' : soon ? '#FEF9F0' : 'var(--panel-alt)';

  const fmtDate = d => {
    const dt = new Date(d + 'T12:00:00');
    return dt.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  };

  const countdownLabel = days === 0 ? 'TODAY' :
                         days === 1 ? 'TOMORROW' :
                         `${days} DAYS`;

  return (
    <div style={{margin:'8px 10px',padding:'9px 10px',background:bgColor,border:`1px solid ${urgent?'#F5C8C0':soon?'#F0DEB4':'var(--line)'}`,fontSize:10}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span style={{fontFamily:'var(--mono)',fontSize:9,letterSpacing:'0.1em',color:'var(--muted)',fontWeight:600}}>NEXT MEET</span>
        <span style={{fontFamily:'var(--mono)',fontSize:9,fontWeight:700,color:accentColor,letterSpacing:'0.04em'}}>{countdownLabel}</span>
      </div>
      <div style={{fontWeight:700,fontSize:11,color:'var(--ink)',lineHeight:1.3,marginBottom:2}}>{meet.shortName}</div>
      <div style={{color:'var(--muted)',fontSize:10}}>{fmtDate(meet.startDate)} · {meet.course}</div>
      {meet.entries && meet.entries.length > 0 && (
        <div style={{marginTop:5,paddingTop:5,borderTop:'1px dotted var(--line-strong)',color:'var(--ink-2)',fontSize:9,fontFamily:'var(--mono)'}}>
          {meet.entries.map(e => (
            <div key={e.eventNum} style={{display:'flex',justifyContent:'space-between',marginBottom:1}}>
              <span>{e.event}</span>
              <span style={{color:'var(--muted)'}}>{e.seedTime} <span style={{color:accentColor}}>#{e.seedRank}</span></span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const SideNav = ({ active, onSelect }) => {
  const SD = useData();
  return (
    <aside style={{width:186,background:'#fff',borderRight:'1px solid var(--line)',display:'flex',flexDirection:'column',fontSize:12,flexShrink:0}}>
      <div style={{padding:'14px 14px 10px',borderBottom:'1px solid var(--line)'}}>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',letterSpacing:'0.14em'}}>SWIMTRACKER</div>
        <div style={{fontWeight:700,fontSize:14,letterSpacing:'-0.01em',marginTop:2}}>{SD.athlete.name}</div>
        <div className="mono" style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{SD.athlete.age}yo · {SD.athlete.lsc} · {SD.athlete.team}</div>
      </div>
      {SD.nextMeet && <MeetCountdown/>}
      <nav style={{padding:'6px 0',flex:1,overflowY:'auto'}}>
        {TABS.map(label => (
          <div key={label} onClick={()=>onSelect(label)} style={{
            padding:'6px 14px',cursor:'pointer',
            background: label===active ? '#F5F6F7' : 'transparent',
            borderLeft: label===active ? '2px solid var(--signal)' : '2px solid transparent',
            color: label===active ? 'var(--ink)' : 'var(--ink-2)',
            fontWeight: label===active ? 600 : 400,
            display:'flex',alignItems:'center',justifyContent:'space-between',
          }}>
            <span>{label}</span>
            {label==='IMX Score' && SD.imx && (
              <span className="mono" style={{fontSize:9,background:'var(--signal)',color:'#fff',padding:'1px 5px',letterSpacing:'0.02em'}}>
                {SD.imx.total.toLocaleString()}
              </span>
            )}
          </div>
        ))}
      </nav>
      <div style={{padding:'10px 14px',borderTop:'1px solid var(--line)',fontSize:10,color:'var(--muted)'}}>
        <div style={{display:'flex',justifyContent:'space-between'}}><span>Season</span><span className="mono">{SD.athlete.season}</span></div>
        <div style={{display:'flex',justifyContent:'space-between'}}><span>Meets</span><span className="mono">{SD.athlete.meets}</span></div>
        <div style={{display:'flex',justifyContent:'space-between'}}><span>Swims</span><span className="mono">{SD.athlete.swims}</span></div>
        {SD.imx && <div style={{display:'flex',justifyContent:'space-between',marginTop:4,paddingTop:4,borderTop:'1px dotted var(--line-strong)'}}>
          <span>IMX</span><span className="mono" style={{color:'var(--signal)',fontWeight:600}}>{SD.imx.total.toLocaleString()} / 5k</span>
        </div>}
      </div>
    </aside>
  );
};

const TopBar = ({ title, course, onCourse }) => {
  return (
    <div style={{display:'flex',alignItems:'center',gap:16,padding:'10px 18px',borderBottom:'1px solid var(--line)',background:'#fff',flexShrink:0}}>
      <div style={{fontWeight:700,fontSize:14}}>{title}</div>
      <div style={{flex:1}}/>
      <div style={{display:'flex',gap:0,border:'1px solid var(--line-strong)'}}>
        {['SCY','SCM','LCM'].map(x => (
          <button key={x} onClick={()=>onCourse(x)} className={'btn '+(course===x?'active':'')}
            style={{border:'none',borderRight:x!=='LCM'?'1px solid var(--line-strong)':'none',borderRadius:0}}>{x}</button>
        ))}
      </div>
    </div>
  );
};

// ─── Tab: Stroke Overview ─────────────────────────────────────────────────────
const StrokeOverview = ({ onEvent, onTab }) => {
  const SD = useData();
  const priority = [...SD.events].filter(e=>e.next&&e.next.gap>=0).sort((a,b)=>a.next.gap-b.next.gap);
  const hero = priority[0];
  const top6 = priority.slice(1, 7);
  const rest = priority.slice(7);
  if (!hero) return <div style={{padding:24,color:'var(--muted)'}}>No event data yet.</div>;
  const imx = SD.imx;
  const imxMilestones = [1000,2000,3000,4000,5000];
  const nextMilestone = imx ? imxMilestones.find(v => v > imx.total) : null;

  return (
    <div style={{flex:1,overflow:'auto',padding:16,display:'flex',flexDirection:'column',gap:12}}>

      {/* IMX Banner */}
      {imx && (
        <div className="panel" onClick={()=>onTab('IMX Score')} style={{padding:'13px 20px',cursor:'pointer',display:'grid',gridTemplateColumns:'auto 1fr auto',gap:24,alignItems:'center'}}>
          <div>
            <div className="kpi-label">IMX SCORE · {SD.athlete.season}</div>
            <div style={{display:'flex',alignItems:'baseline',gap:6,marginTop:3}}>
              <div className="mono" style={{fontSize:32,fontWeight:600,letterSpacing:'-0.02em',lineHeight:1}}>{imx.total.toLocaleString()}</div>
              <div className="mono" style={{fontSize:12,color:'var(--muted)'}}> / 5,000</div>
            </div>
          </div>
          <div>
            <div style={{position:'relative',height:10,background:'#F3F4F6',border:'1px solid var(--line)',borderRadius:0}}>
              <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${(imx.total/5000)*100}%`,background:'linear-gradient(to right,#C97A4A,#B54A2E)'}}/>
              {imxMilestones.slice(0,-1).map(v=>(
                <div key={v} style={{position:'absolute',left:`${(v/5000)*100}%`,top:-2,bottom:-2,width:1,background:'var(--line-strong)'}}/>
              ))}
            </div>
            <div className="mono" style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--muted)',marginTop:3}}>
              {imxMilestones.map(v=>(
                <span key={v} style={{color: imx.total>=v ? 'var(--good)' : v===nextMilestone ? 'var(--ink)' : 'var(--muted-2)', fontWeight: v===nextMilestone ? 700 : 400}}>
                  {imx.total>=v ? '✓' : ''}{v/1000}k
                </span>
              ))}
            </div>
            <div className="mono" style={{fontSize:10,color:'var(--muted)',marginTop:4}}>
              {imx.events.map(ev=>`${ev.ev} ${ev.pts}pts`).join(' · ')}
            </div>
          </div>
          {nextMilestone ? (
            <div style={{textAlign:'right',borderLeft:'1px solid var(--line)',paddingLeft:20}}>
              <div className="kpi-label">NEXT MILESTONE</div>
              <div className="mono" style={{fontSize:22,fontWeight:700,color:'var(--signal)',marginTop:3}}>{nextMilestone.toLocaleString()}</div>
              <div className="mono" style={{fontSize:11,color:'var(--muted)',marginTop:1}}>+{(nextMilestone-imx.total)} pts to go</div>
              <div className="mono" style={{fontSize:9,color:'var(--muted-2)',marginTop:3}}>details →</div>
            </div>
          ) : (
            <div style={{textAlign:'right',borderLeft:'1px solid var(--line)',paddingLeft:20}}>
              <div className="mono" style={{color:'var(--good)',fontWeight:700,fontSize:14}}>MAX REACHED</div>
            </div>
          )}
        </div>
      )}

      {/* LC Season Readiness */}
      {SD.lcmQualified && (() => {
        const lcmQ = SD.lcmQualified;
        const stateNext = (SD.upcomingMeets||[]).find(m => m.qualifyingRequired);
        const qual     = stateNext ? stateNext.qualifiedCount : lcmQ.bbCount;
        const total    = stateNext ? stateNext.totalQualEvents : lcmQ.bbTotal;
        const meetName = stateNext ? stateNext.shortName : 'USA-S BB Standard';
        const daysAway = stateNext ? stateNext.daysAway : null;

        // Build unified event list: [{ev, pb, isQual, qualTime}]
        const displayEvents = stateNext
          ? [
              ...(stateNext.qualifiedEvents||[]).map(e=>({ev:e.event, pb:e.pb, isQual:true,  qualTime:e.qualTime})),
              ...(stateNext.unqualifiedEvents||[]).map(e=>({ev:e.event, pb:e.pb, isQual:false, qualTime:e.qualTime})),
            ].sort((a,b)=>a.ev.localeCompare(b.ev))
          : lcmQ.events.map(e=>({ev:e.ev, pb:e.pb, isQual:e.bbQual, qualTime:null}));

        const unqual = displayEvents.filter(e=>!e.isQual);

        return (
          <div className="panel" style={{padding:'13px 20px',display:'grid',gridTemplateColumns:'auto 1fr',gap:20,alignItems:'start'}}>
            <div style={{minWidth:110}}>
              <div className="kpi-label">LC STATE READINESS</div>
              <div style={{display:'flex',alignItems:'baseline',gap:4,marginTop:3}}>
                <div className="mono" style={{fontSize:40,fontWeight:700,letterSpacing:'-0.03em',lineHeight:1,color:'var(--good)'}}>{qual}</div>
                <div className="mono" style={{fontSize:16,color:'var(--muted)'}}>/ {total}</div>
              </div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>events qualified</div>
              <div style={{marginTop:6,height:5,background:'#EEF0F3',position:'relative',width:90}}>
                <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${Math.round(qual/total*100)}%`,background:'var(--good)'}}/>
              </div>
              <div className="mono" style={{fontSize:10,color:'var(--muted)',marginTop:5}}>{meetName}</div>
              {daysAway !== null && (
                <div className="mono" style={{fontSize:10,color:daysAway<=7?'var(--signal)':'var(--muted)',marginTop:2,fontWeight:600}}>
                  {daysAway === 0 ? 'TODAY' : daysAway === 1 ? '1 day away' : `${daysAway} days away`}
                </div>
              )}
            </div>
            <div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(72px,1fr))',gap:4,marginBottom:6}}>
                {displayEvents.map(ev => (
                  <div key={ev.ev} style={{
                    padding:'5px 7px',
                    background: ev.isQual ? '#EFF8F1' : '#FEF0ED',
                    border: `1px solid ${ev.isQual ? '#A8D5B5' : '#F5C8C0'}`,
                    fontSize:10,display:'flex',flexDirection:'column',gap:1
                  }}>
                    <div style={{display:'flex',alignItems:'center',gap:4}}>
                      <span style={{width:5,height:5,borderRadius:'50%',background:ev.isQual?'var(--good)':'var(--signal)',display:'inline-block',flexShrink:0}}/>
                      <span style={{fontWeight:700}}>{ev.ev}</span>
                    </div>
                    <div className="mono" style={{fontSize:9,color:'var(--muted)',paddingLeft:9}}>{fmtT(ev.pb)}</div>
                    {ev.qualTime && <div className="mono" style={{fontSize:9,color:ev.isQual?'var(--good)':'var(--signal)',paddingLeft:9}}>
                      {ev.isQual ? `−${(ev.qualTime - ev.pb).toFixed(2)}` : `+${(ev.pb - ev.qualTime).toFixed(2)}`}
                    </div>}
                  </div>
                ))}
              </div>
              {unqual.length > 0 && (
                <div style={{fontSize:10,color:'var(--muted)'}}>
                  <span style={{fontWeight:600,color:'var(--signal)'}}>Still to qualify: </span>
                  {unqual.map((e,i) => (
                    <span key={e.ev} className="mono">
                      {e.ev} (need {e.qualTime ? fmtT(e.qualTime) : 'BB'}){i<unqual.length-1?', ':''}
                    </span>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* Hero */}
      <div className="panel" style={{padding:'16px 20px',display:'grid',gridTemplateColumns:'1.1fr 1fr 1fr',gap:22}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div className="kpi-label" style={{color:SD.strokes[hero.stroke]?.color}}>CLOSEST CUT · 2024-28 STANDARDS</div>
          </div>
          <div onClick={()=>onEvent(hero.ev)} style={{cursor:'pointer',marginTop:4}}>
            <div style={{display:'flex',alignItems:'baseline',gap:10,flexWrap:'wrap'}}>
              <div style={{fontWeight:800,fontSize:26,letterSpacing:'-0.02em'}}>{hero.ev}</div>
              <TierChip tier={hero.tier}/>
              {hero.next.tier && <><span className="mono" style={{color:'var(--muted)'}}>→</span><TierChip tier={hero.next.tier} size="lg"/></>}
              <span className="mono" style={{fontSize:10,color:'var(--muted-2)',marginLeft:'auto'}}>view history ↗</span>
            </div>
            {hero.next.gap > 0 && (
              <div style={{display:'flex',alignItems:'baseline',gap:4,marginTop:10}}>
                <div className="mono" style={{fontSize:64,fontWeight:500,letterSpacing:'-0.03em',lineHeight:1,color:'var(--signal)'}}>−{hero.next.gap.toFixed(2)}</div>
                <div className="mono" style={{fontSize:16,color:'var(--muted)'}}>s</div>
              </div>
            )}
            {hero.next.gap === 0 && <div className="mono" style={{fontSize:22,color:'var(--good)',marginTop:10}}>CUT ACHIEVED</div>}
            <div className="mono" style={{fontSize:11,color:'var(--muted-2)',marginTop:4}}>

              ['Gap', hero.next.gap > 0 ? `−${hero.next.gap.toFixed(2)}s` : 'Cut achieved'],

              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:i<arr.length-1?'1px dotted var(--line-strong)':'none'}}>

                <div style={{fontWeight:700,fontSize:13}}>{e.ev}</div>
                <div style={{flex:1}}/>
                <TierChip tier={e.tier}/>
                {e.next.tier && <><span className="mono" style={{fontSize:10,color:'var(--muted)'}}>→</span><TierChip tier={e.next.tier} size="sm"/></>}

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 60px',gap:8,marginTop:10,alignItems:'center'}}>
                <div><div className="kpi-label">PB</div><div className="mono" style={{fontSize:14}}>{fmtT(e.pb)}</div></div>
                <div><div className="kpi-label">GAP</div><div className="mono" style={{fontSize:14,color:'var(--signal)',fontWeight:600}}>{e.next.gap>0?`−${e.next.gap.toFixed(2)}`:'✓'}</div></div>
                <div><div className="kpi-label">90d</div><div className="mono" style={{fontSize:14,color:e.trend<0?'var(--good)':'var(--signal)'}}>{(e.trend||0).toFixed(1)}%</div></div>
                {SD.trend[e.ev] ? <Sparkline data={SD.trend[e.ev]} color={SD.strokes[e.stroke]?.color||'#333'} w={60} h={22} fill/> : <div/>}

      {/* Longer horizon */}

        <div className="panel">

                const perWeek = Math.abs(e.trend||0) * e.pb / 100 / 12;
                const weeks = e.trend<0 && perWeek>0 ? Math.ceil(e.next.gap/perWeek) : '—';
                return (
                  <tr key={e.ev} style={{cursor:'pointer'}} onClick={()=>onEvent(e.ev)}>
                    <td><StrokeDot stroke={e.stroke}/>{e.ev}</td>

                    <td className="num muted">{e.next.cut ? fmtT(e.next.cut) : '—'}</td>
                    <td className="num" style={{color:'var(--signal)',fontWeight:600}}>{e.next.gap>0?`−${e.next.gap.toFixed(2)}`:'✓'}</td>

                    <td style={{width:100}}>{SD.trend[e.ev] ? <Sparkline data={SD.trend[e.ev]} color={SD.strokes[e.stroke]?.color||'#333'} w={90} h={16}/> : <span className="mono muted">—</span>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

// ─── Tab: Event Detail Drawer ─────────────────────────────────────────────────
const EventDetail = ({ ev, onClose, course }) => {
  const SD = useData();
  // Look up in SCY events first, then LCM events
  const e = SD.events.find(x => x.ev === ev)
         || (SD.lcmQualified?.events||[]).find(x => x.ev === ev)
         || SD.events[0];
  if (!e) return null;
  const evCourse = e.course || course || 'SCY';
  const stroke = SD.strokes[e.stroke] || {name:e.stroke,color:'#333'};

  // Build history for this event
  const races = SD.history.filter(r => r.event === ev).sort((a,b) => a.date.localeCompare(b.date));
  const times = races.map(r => r.time);
  const best = Math.min(...times), worst = Math.max(...times);
  const W=680,H=200,pL=42,pR=12,pT=12,pB=22;

  const pts = races.map((r,i) => ({
    x: pL + (i/(races.length-1||1))*(W-pL-pR),
    y: pT + ((r.time-best)/(worst-best||0.01))*(H-pT-pB),
    r,
  }));
  const dPath = pts.length>1 ? 'M '+pts.map(p=>`${p.x},${p.y}`).join(' L ') : '';

  // Cut reference lines
  const cutLines = Object.entries(e.cuts||{}).filter(([,t])=>t>best&&t<worst+0.5).map(([k,t])=>({k,t}));

  return (
    <div style={{position:'absolute',inset:0,background:'rgba(26,29,33,0.35)',display:'flex',justifyContent:'flex-end',zIndex:20,animation:'fadeIn .15s'}}>
      <div style={{width:760,background:'#fff',borderLeft:'1px solid var(--line-strong)',display:'flex',flexDirection:'column',animation:'slide .2s ease-out'}}>
        <div style={{padding:'12px 18px',borderBottom:'1px solid var(--line)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <StrokeDot stroke={e.stroke} size={10}/>
          <div style={{fontWeight:800,fontSize:18}}>{e.ev}</div>
          <div className="mono" style={{fontSize:10,color:'var(--muted)'}}>{evCourse} · {stroke.name}</div>
          <div style={{flex:1}}/>
          <button className="btn" onClick={onClose}>Close ✕</button>
        </div>
        <div style={{flex:1,overflow:'auto',padding:18,display:'flex',flexDirection:'column',gap:14}}>
          {/* KPIs */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',border:'1px solid var(--line)'}}>
            {[
              ['PB', fmtT(e.pb), 'var(--ink)'],
              ['TIER', e.tier, stroke.color],
              ['NEXT CUT', e.next.cut ? fmtT(e.next.cut) : 'Top tier', 'var(--muted)'],
              ['GAP', e.next.gap>0 ? `−${e.next.gap.toFixed(2)}s` : 'Cut achieved', 'var(--signal)'],
              ['90d Δ', `${(e.trend||0).toFixed(1)}%`, e.trend<0?'var(--good)':'var(--signal)'],
            ].map(([k,v,c],i) => (
              <div key={k} style={{padding:'10px 12px',borderRight:i<4?'1px solid var(--line)':'none'}}>
                <div className="kpi-label">{k}</div>
                <div className="mono" style={{fontSize:18,color:c,fontWeight:500}}>{v}</div>
              </div>
            ))}
          </div>

          {/* Chart */}
          {pts.length > 1 && (
            <div>
              <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>TIME PROGRESSION · {races.length} races</div>
              <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{border:'1px solid var(--line)'}}>
                {cutLines.map(({k,t}) => {
                  const y = pT+((t-best)/(worst-best||0.01))*(H-pT-pB);
                  const tier = SD.tiers.find(x=>x.key===k);
                  return (<g key={k}>
                    <line x1={pL} x2={W-pR} y1={y} y2={y} stroke={tier?.color||'#ccc'} strokeDasharray="3 3" strokeWidth="1"/>
                    <text x={W-pR-3} y={y-3} textAnchor="end" fontFamily="var(--mono)" fontSize="9" fill={tier?.color||'#ccc'}>{k} {fmtT(t)}</text>
                  </g>);
                })}
                <path d={dPath} fill="none" stroke={stroke.color} strokeWidth="1.5"/>
                {pts.map((p,i) => (
                  <g key={i}>
                    <circle cx={p.x} cy={p.y} r={p.r.pb?4:2.5} fill={p.r.pb?'var(--signal)':'#fff'} stroke={p.r.pb?'var(--signal)':stroke.color} strokeWidth="1.5"/>
                    {p.r.pb && <text x={p.x} y={p.y-7} textAnchor="middle" fontFamily="var(--mono)" fontSize="8.5" fill="var(--signal)">{fmtT(p.r.time)}</text>}
                  </g>
                ))}
                {pts.filter((_,i)=>i%Math.max(1,Math.floor(pts.length/6))===0).map((p,i)=>(
                  <text key={i} x={p.x} y={H-6} textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill="#9AA1AC">{p.r.date.slice(5)}</text>
                ))}
              </svg>
            </div>
          )}

          {/* Tier cuts reference */}
          {Object.keys(e.cuts||{}).length > 0 && (
            <div>
              <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>USA SWIMMING CUTS · {e.ev} · {evCourse} 15-16 Male</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:1,background:'var(--line)'}}>
                {['B','BB','A','AA','AAA','AAAA'].map(tier => {
                  const t = SD.tiers.find(x=>x.key===tier);
                  const cut = e.cuts[tier];
                  const isPb = tier === e.tier;
                  return (
                    <div key={tier} style={{background:isPb?t?.color:'#fff',padding:'8px 10px',textAlign:'center'}}>
                      <div style={{fontSize:9,fontWeight:700,color:isPb?t?.fg:'var(--muted)',letterSpacing:'0.06em'}}>{tier}</div>
                      <div className="mono" style={{fontSize:13,color:isPb?t?.fg:'var(--ink)',marginTop:2}}>{fmtT(cut)}</div>
                      {isPb && <div style={{fontSize:8,color:t?.fg,marginTop:1,opacity:0.8}}>current</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Race log */}
          {races.length > 0 && (
            <div>
              <div style={{fontWeight:700,fontSize:12,marginBottom:4}}>RACE LOG</div>
              <table className="data">
                <thead><tr><th>Date</th><th>Meet</th><th className="num">Time</th><th>Tier</th><th className="num">PB</th></tr></thead>
                <tbody>
                  {races.slice().reverse().map((r,i) => (
                    <tr key={i}>
                      <td className="mono" style={{fontSize:11}}>{r.date}</td>
                      <td>{r.meet}</td>
                      <td className="num" style={{fontWeight:r.pb?700:500}}>{fmtT(r.time)}</td>
                      <td>{r.tier ? <TierChip tier={r.tier} size="sm"/> : <span className="mono muted" style={{fontSize:9}}>&lt;B</span>}</td>
                      <td className="num">{r.pb?<span className="mono" style={{color:'var(--signal)',fontSize:10,fontWeight:700}}>PB</span>:''}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ─── Tab: Quick Lookup ────────────────────────────────────────────────────────
const STROKE_COLS = [
  { key:'FR', name:'Free'   },
  { key:'BK', name:'Back'   },
  { key:'BR', name:'Breast' },
  { key:'FL', name:'Fly'    },
  { key:'IM', name:'IM'     },
];

const QuickLookup = ({ onEvent, course }) => {
  const SD = useData();

  // Source depends on selected course
  const evList = course === 'LCM' ? (SD.lcmQualified?.events || [])
               : course === 'SCY' ? SD.events
               : [];

  const evMap = {};
  evList.forEach(e => { evMap[e.ev] = e; });

  // All distances present in this course's data, ascending
  const dists = [...new Set(evList.map(e => parseInt(e.ev.split(' ')[0])))].sort((a,b)=>a-b);

  if (evList.length === 0) return (
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:10,color:'var(--muted)'}}>
      <div style={{fontSize:14,fontWeight:600}}>No {course} data yet</div>
      <div className="mono" style={{fontSize:11}}>
        {course==='SCM' ? 'No short-course meters swims on record.' : 'Run the pipeline after uploading a swim history HTML.'}
      </div>
    </div>
  );

  const HEADER_H = 36;

  return (
    <div style={{flex:1,overflow:'auto'}}>
      <div style={{
        display:'grid',
        gridTemplateColumns:`52px repeat(5,1fr)`,
        gap:'1px',
        background:'var(--line)',
        minWidth:520,
      }}>
        {/* ── Header row ── */}
        <div style={{background:'var(--panel-alt)',height:HEADER_H,position:'sticky',top:0,zIndex:3}}/>
        {STROKE_COLS.map(col => (
          <div key={col.key} style={{
            background:'var(--panel-alt)',height:HEADER_H,
            display:'flex',alignItems:'center',gap:6,
            padding:'0 14px',fontWeight:700,fontSize:12,
            position:'sticky',top:0,zIndex:3,
            borderBottom:'2px solid var(--line-strong)',
          }}>
            <StrokeDot stroke={col.key} size={8}/>
            {col.name}
          </div>
        ))}

        {/* ── Data rows ── */}
        {dists.flatMap(dist => [
          /* distance label */
          <div key={`lbl-${dist}`} style={{
            background:'var(--panel-alt)',
            display:'flex',alignItems:'center',justifyContent:'center',
            padding:'14px 4px',
          }}>
            <span className="mono" style={{fontSize:11,fontWeight:700,color:'var(--muted)'}}>{dist}</span>
          </div>,

          /* one cell per stroke */
          ...STROKE_COLS.map(col => {
            const evKey = `${dist} ${col.key}`;
            const e = evMap[evKey];
            const sc = SD.strokes[col.key]?.color || '#333';
            return (
              <div key={`${dist}-${col.key}`}
                className={`ev-cell${e?' has-data':''}`}
                onClick={e ? () => onEvent(evKey) : undefined}
                style={{padding:'12px 14px',minHeight:72}}
              >
                {e ? (<>
                  <div className="mono" style={{fontSize:19,fontWeight:600,letterSpacing:'-0.01em',color:'var(--ink)',marginBottom:5}}>
                    {fmtT(e.pb)}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                    <TierChip tier={e.tier} size="sm"/>
                    {e.next?.gap > 0 &&
                      <span className="mono" style={{fontSize:10,color:'var(--signal)',fontWeight:600}}>−{e.next.gap.toFixed(2)}s</span>}
                    {(!e.next?.gap || e.next.gap === 0) && e.next?.tier === null &&
                      <span className="mono" style={{fontSize:9,color:'var(--good)'}}>AAAA</span>}
                  </div>
                  {e.next?.tier && e.next.gap > 0 &&
                    <div className="mono" style={{fontSize:9,color:'var(--muted-2)',marginTop:3}}>
                      → {e.next.tier} {fmtT(e.next.cut)}
                    </div>}
                </>) : (
                  <span className="mono" style={{color:'var(--line-strong)',fontSize:18}}>—</span>
                )}
              </div>
            );
          }),
        ])}
      </div>
    </div>
  );
};

// ─── Tab: Swim History ────────────────────────────────────────────────────────
const SwimHistory = () => {
  const SD = useData();
  const [filter, setFilter] = useState({stroke:'ALL',pb:false,q:''});
  const [liveSwims, setLiveSwims] = useState(SD.liveSwims || []);
  const [uploading, setUploading] = useState(false);
  const [uploadMsg, setUploadMsg] = useState('');
  const fileRef = React.useRef();

  const handlePhoto = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    setUploadMsg('Reading screenshot…');
    const fd = new FormData();
    fd.append('photo', file);
    try {
      const r = await fetch('/api/photo-swim', {method:'POST', body:fd, credentials:'same-origin'});
      if (!r.ok) throw new Error(`Server error ${r.status} — try again`);
      const swim = await r.json();
      if (swim.error) throw new Error(swim.error);
      setLiveSwims(prev => [...prev, swim]);
      setUploadMsg('✓ Added: '+swim.event+' '+fmtT(swim.time));
    } catch(err) {
      setUploadMsg('Error: '+err.message);
    } finally {
      setUploading(false);
      e.target.value = '';
      setTimeout(()=>setUploadMsg(''), 4000);
    }
  };

  const dismissLive = async (id) => {
    await fetch('/api/live-swims/'+id, {method:'DELETE'});
    setLiveSwims(prev => prev.filter(s => s.id !== id));
  };

  const allRows = useMemo(() => {
    const live = liveSwims.map(s => ({...s, live:true}));
    return [...SD.history, ...live].sort((a,b) => b.date.localeCompare(a.date));
  }, [liveSwims]);

  const rows = useMemo(() => allRows.filter(r => {
    if (filter.stroke !== 'ALL' && strokeOf(r.event) !== filter.stroke) return false;
    if (filter.pb && !r.pb) return false;
    if (filter.q && !(r.event+r.meet).toLowerCase().includes(filter.q.toLowerCase())) return false;
    return true;
  }), [filter, allRows]);

  return (
    <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
      {liveSwims.length > 0 && (
        <div style={{background:'#FFFBEB',borderBottom:'1px solid #F59E0B',padding:'4px 16px',flexShrink:0,fontSize:10,color:'#92400E'}}>
          ★ {liveSwims.length} live result{liveSwims.length>1?'s':''} below — marked * — will merge on next pipeline run
        </div>
      )}
      <div style={{padding:'10px 16px',borderBottom:'1px solid var(--line)',background:'#fff',display:'flex',alignItems:'center',gap:10,flexShrink:0,flexWrap:'wrap'}}>
        <input value={filter.q} onChange={e=>setFilter({...filter,q:e.target.value})} placeholder="Filter by event or meet…"
          style={{width:230,padding:'5px 8px',fontFamily:'var(--mono)',fontSize:11,border:'1px solid var(--line-strong)',outline:'none',background:'var(--panel-alt)'}}/>
        <div style={{display:'flex',border:'1px solid var(--line-strong)'}}>
          {['ALL','FR','BK','BR','FL','IM'].map((s,i,arr)=>(
            <button key={s} onClick={()=>setFilter({...filter,stroke:s})}
              className={'btn '+(filter.stroke===s?'active':'')}
              style={{border:'none',borderRight:i<arr.length-1?'1px solid var(--line-strong)':'none',borderRadius:0,padding:'4px 10px'}}>{s}</button>
          ))}
        </div>
        <label style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--ink-2)',cursor:'pointer',userSelect:'none'}}>
          <input type="checkbox" checked={filter.pb} onChange={e=>setFilter({...filter,pb:e.target.checked})}/> PBs only
        </label>
        <div style={{flex:1}}/>
        {uploadMsg && <span className="mono" style={{fontSize:10,color:uploadMsg.startsWith('✓')?'var(--signal)':'#DC2626'}}>{uploadMsg}</span>}
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePhoto}/>
        <button onClick={()=>fileRef.current.click()} disabled={uploading}
          className="btn" title="Add swim from Meet Mobile screenshot"
          style={{padding:'4px 10px',fontSize:11,display:'flex',alignItems:'center',gap:5,opacity:uploading?0.6:1}}>
          {uploading ? '…' : '📷'} Add swim
        </button>
        <div className="mono muted" style={{fontSize:10}}>{rows.length} of {SD.history.length + liveSwims.length} swims</div>
      </div>
      <div style={{flex:1,overflow:'auto',background:'#fff'}}>
        <table className="data">
          <thead><tr>
            <th style={{width:28}}>#</th><th>Date</th><th>Meet</th><th>Event</th>
            <th className="num">Time</th><th>Course</th><th>Tier</th><th>PB</th>
          </tr></thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={r.live ? 'live-'+r.id : r.id} style={{background:r.live?'#FFFBEB':r.pb?'#FFF6F3':undefined}}>
                <td className="mono muted" style={{fontSize:10}}>{r.live ? '★' : String(i+1).padStart(3,'0')}</td>
                <td className="mono" style={{fontSize:11}}>{r.date}</td>
                <td style={{maxWidth:240,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {r.meet}
                  {r.live && r.splits && r.splits.length > 0 && <span className="mono muted" style={{fontSize:9,marginLeft:6}}>{r.splits.join(' / ')}</span>}
                </td>
                <td><StrokeDot stroke={strokeOf(r.event)} size={6}/>{r.event}{r.live&&<span style={{color:'#F59E0B',marginLeft:3}}>*</span>}</td>
                <td className="num" style={{fontWeight:r.pb?700:500}}>{fmtT(r.time)}</td>
                <td className="mono muted" style={{fontSize:10}}>{r.course}</td>
                <td>{r.tier ? <TierChip tier={r.tier} size="sm"/> : <span className="mono muted" style={{fontSize:9}}>&lt;B</span>}</td>
                <td>{r.live
                  ? <button onClick={()=>dismissLive(r.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#92400E',fontSize:11,padding:0}}>×</button>
                  : r.pb?<span className="mono" style={{color:'var(--signal)',fontSize:10,fontWeight:700}}>PB</span>:''
                }</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// ─── Tab: Deep Analytics ─────────────────────────────────────────────────────
const DeepAnalytics = ({ onEvent }) => {
  const SD = useData();
  const seasons = Object.keys(SD.seasonPbs||{}).sort();
  const [selSeason, setSelSeason] = useState(seasons[seasons.length-1]);

  // Season-over-season comparison for key events
  const compEvents = SD.events.map(e=>e.ev);

  // PB timeline as chart
  const ptl = SD.pbTimeline || [];
  const tierToY = (tier) => {
    const idx = SD.tiers.findIndex(t=>t.key===tier);
    return idx >= 0 ? idx : 0;
  };

  // Group PB timeline by event
  const ptlBySeries = {};
  ptl.forEach(p => {
    if (!ptlBySeries[p.ev]) ptlBySeries[p.ev] = [];
    ptlBySeries[p.ev].push(p);
  });

  const tlDates = ptl.map(p=>p.date);
  const tlMinDate = tlDates.reduce((a,b)=>a<b?a:b,'9999');
  const tlMaxDate = tlDates.reduce((a,b)=>a>b?a:b,'0000');
  const tlSpanMonths = (new Date(tlMaxDate) - new Date(tlMinDate)) / (1000*60*60*24*30) || 1;

  const dateToX = (d) => {
    const months = (new Date(d) - new Date(tlMinDate)) / (1000*60*60*24*30);
    return 44 + (months/tlSpanMonths) * 596;
  };
  const tierColors = ['#C4C8CE','#9AA1AC','#D4A574','#C97A4A','#B54A2E','#8B2817'];
  const tlH = 120, tlPadT = 10, tlPadB = 20;

  const tlSeriesColors = {};
  ['50 FR','100 FL','200 IM','100 BK','100 FR'].forEach((ev,i) => {
    const s = SD.events.find(x=>x.ev===ev);
    tlSeriesColors[ev] = s ? (SD.strokes[s.stroke]?.color||'#333') : '#333';
  });

  return (
    <div style={{flex:1,overflow:'auto',padding:16,display:'flex',flexDirection:'column',gap:12}}>

      {/* PB Timeline chart */}
      <div className="panel" style={{padding:'14px 18px'}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>PB TIMELINE — STANDARD PROGRESSION</div>
        <div className="mono muted" style={{fontSize:10,marginBottom:10}}>Each dot = new personal best. Position = standard achieved at that time.</div>
        {ptl.length > 0 ? (
          <svg width="100%" viewBox="0 0 680 120" style={{overflow:'visible'}}>
            {/* tier band backgrounds */}
            {SD.tiers.map((t,i) => (
              <rect key={t.key} x={44} y={tlPadT+(i/SD.tiers.length)*(tlH-tlPadT-tlPadB)}
                width={636} height={(tlH-tlPadT-tlPadB)/SD.tiers.length} fill={t.color} opacity="0.08"/>
            ))}
            {SD.tiers.map((t,i) => (
              <text key={'l'+t.key} x={40} y={tlPadT+((i+0.5)/SD.tiers.length)*(tlH-tlPadT-tlPadB)+3}
                textAnchor="end" fontFamily="var(--mono)" fontSize="9" fill="#6B7280">{t.label}</text>
            ))}
            {Object.entries(ptlBySeries).filter(([ev])=>tlSeriesColors[ev]).map(([ev,pts]) => {
              const mapped = pts.map(p => ({
                x: dateToX(p.date+'-01'),
                y: tlPadT+((SD.tiers.length-1-tierToY(p.tier))/SD.tiers.length)*(tlH-tlPadT-tlPadB)+(tlH-tlPadT-tlPadB)/(SD.tiers.length*2),
                p,
              }));
              const d = mapped.length>1 ? 'M '+mapped.map(m=>`${m.x},${m.y}`).join(' L ') : '';
              const col = tlSeriesColors[ev];
              return (
                <g key={ev}>
                  {d && <path d={d} fill="none" stroke={col} strokeWidth="1.5"/>}
                  {mapped.map((m,i)=>(
                    <g key={i}>
                      <circle cx={m.x} cy={m.y} r="3" fill="#fff" stroke={col} strokeWidth="1.5"/>
                      {i===mapped.length-1 && <text x={m.x+6} y={m.y+3} fontFamily="var(--mono)" fontSize="9" fill={col}>{ev}</text>}
                    </g>
                  ))}
                </g>
              );
            })}
          </svg>
        ) : <div className="mono muted" style={{fontSize:11}}>No PB timeline data yet.</div>}
      </div>

      {/* Season comparison */}
      {seasons.length > 0 && (
        <div className="panel">
          <div style={{padding:'10px 14px',borderBottom:'1px solid var(--line)',display:'flex',alignItems:'center',gap:12}}>
            <div style={{fontWeight:700,fontSize:12}}>SEASON BEST TIMES</div>
            <div style={{display:'flex',gap:0,border:'1px solid var(--line-strong)',marginLeft:'auto'}}>
              {seasons.map(s=>(
                <button key={s} onClick={()=>setSelSeason(s)}
                  className={'btn '+(selSeason===s?'active':'')}
                  style={{border:'none',borderRight:s!==seasons[seasons.length-1]?'1px solid var(--line-strong)':'none',borderRadius:0,padding:'4px 10px',fontSize:10}}>{s}</button>
              ))}
            </div>
          </div>
          <table className="data">
            <thead><tr>
              <th>Event</th><th>Tier</th>
              {seasons.map(s=><th key={s} className="num" style={{color:s===selSeason?'var(--ink)':'var(--muted)'}}>{s}</th>)}
              <th className="num">Best ever</th>
            </tr></thead>
            <tbody>
              {compEvents.map(ev=>{
                const e = SD.events.find(x=>x.ev===ev);
                return (
                  <tr key={ev} style={{cursor:'pointer'}} onClick={()=>onEvent(ev)}>
                    <td><StrokeDot stroke={strokeOf(ev)} size={6}/><strong>{ev}</strong></td>
                    <td>{e ? <TierChip tier={e.tier} size="sm"/> : null}</td>
                    {seasons.map(s=>{
                      const t = SD.seasonPbs[s]?.[ev];
                      const isSelected = s === selSeason;
                      return <td key={s} className="num mono" style={{fontWeight:isSelected?700:400,color:isSelected?'var(--ink)':'var(--muted)'}}>{t ? fmtT(t) : '—'}</td>;
                    })}
                    <td className="num" style={{fontWeight:700,color:'var(--signal)'}}>{e ? fmtT(e.pb) : '—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Penetration rates */}
      {(SD.penetration||[]).length > 0 && (
        <div className="panel" style={{padding:'14px 18px'}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:4}}>ESTIMATED PERCENTILE vs AGE GROUP PEERS</div>
          <div className="mono muted" style={{fontSize:10,marginBottom:12}}>Based on USA Swimming standard tier achieved. Approximate.</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {SD.penetration.map(p=>(
              <div key={p.ev} style={{display:'grid',gridTemplateColumns:'70px 1fr 38px',alignItems:'center',gap:10}}>
                <div style={{fontSize:11}}><StrokeDot stroke={p.stroke} size={6}/>{p.ev}</div>
                <div style={{position:'relative',height:12,background:'#F3F4F6'}}>
                  <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${p.pct}%`,background:SD.strokes[p.stroke]?.color||'#333',opacity:0.85}}/>
                  {[25,50,75].map(t=><div key={t} style={{position:'absolute',left:`${t}%`,top:-1,bottom:-1,width:1,background:'rgba(255,255,255,0.6)'}}/>)}
                </div>
                <div className="mono" style={{fontSize:10,textAlign:'right'}}>{p.pct}%</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── Tab: IMX Score ───────────────────────────────────────────────────────────
const IMXScore = () => {
  const SD = useData();
  const imx = SD.imx;
  const hist = SD.imxHistory||[];
  if (!imx) return <div style={{padding:24,color:'var(--muted)'}}>No IMX data.</div>;
  const W=580,H=140,pL=40,pR=10,pT=10,pB=22,maxS=5000,minS=0;
  const pts = hist.filter(h=>h.score).map((h,i)=>({
    x: pL+(i/(hist.length-1||1))*(W-pL-pR),
    y: pT+(1-(h.score-minS)/(maxS-minS))*(H-pT-pB),
    h,
  }));
  return (
    <div style={{flex:1,overflow:'auto',padding:16,display:'flex',flexDirection:'column',gap:12}}>
      <div className="panel" style={{padding:'18px 22px',display:'grid',gridTemplateColumns:'1fr 1.2fr',gap:28}}>
        <div>
          <div className="kpi-label">IMX ESTIMATE · {SD.athlete.season}</div>
          <div style={{display:'flex',alignItems:'baseline',gap:10,marginTop:6}}>
            <div className="mono" style={{fontSize:72,fontWeight:500,letterSpacing:'-0.03em',lineHeight:1}}>{imx.total.toLocaleString()}</div>
            <div className="mono" style={{fontSize:14,color:'var(--muted)'}}>/ {imx.max.toLocaleString()}</div>
          </div>
          <div className="mono muted" style={{fontSize:11,marginTop:6}}>Score based on 5 IMX events · linear B→AAAA scale</div>
          <div style={{marginTop:14,position:'relative',height:16,background:'#F3F4F6',border:'1px solid var(--line)'}}>
            <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${(imx.total/imx.max)*100}%`,background:'linear-gradient(to right, #C97A4A, #B54A2E)'}}/>
            {[1000,2000,3000,4000].map(v=>(
              <div key={v} style={{position:'absolute',left:`${(v/imx.max)*100}%`,top:-2,bottom:-2,width:1,background:'var(--line-strong)'}}/>
            ))}
          </div>
          <div className="mono" style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--muted)',marginTop:2}}>
            <span>0</span><span>1k</span><span>2k</span><span>3k</span><span>4k</span><span>5k</span>
          </div>
        </div>
        <div style={{borderLeft:'1px solid var(--line)',paddingLeft:28}}>
          <div className="kpi-label">HISTORY</div>
          {pts.length > 1 ? (
            <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{marginTop:6}}>
              {[1000,2000,3000,4000].map(v=>{const y=pT+(1-(v-minS)/(maxS-minS))*(H-pT-pB);return(
                <g key={v}><line x1={pL} x2={W-pR} y1={y} y2={y} stroke="#F0F1F4" strokeWidth="1"/>
                <text x={pL-4} y={y+3} textAnchor="end" fontFamily="var(--mono)" fontSize="9" fill="#9AA1AC">{v}</text></g>
              );})}
              <path d={'M '+pts.map(p=>`${p.x},${p.y}`).join(' L ')} fill="none" stroke="var(--signal)" strokeWidth="1.8"/>
              {pts.map((p,i)=>(
                <g key={i}>
                  <circle cx={p.x} cy={p.y} r="3" fill="#fff" stroke="var(--signal)" strokeWidth="1.5"/>
                  <text x={p.x} y={p.y-7} textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill="var(--ink)">{p.h.score}</text>
                  <text x={p.x} y={H-6} textAnchor="middle" fontFamily="var(--mono)" fontSize="9" fill="#9AA1AC">{p.h.season}</text>
                </g>
              ))}
            </svg>
          ) : <div className="mono muted" style={{fontSize:11,marginTop:12}}>Data accumulates over multiple seasons.</div>}
        </div>
      </div>

      {/* Event Contribution */}
      <div className="panel">
        <div style={{padding:'10px 14px',borderBottom:'1px solid var(--line)',display:'flex',alignItems:'center'}}>
          <div style={{fontWeight:700,fontSize:12}}>EVENT CONTRIBUTION</div>
          <div className="mono muted" style={{fontSize:10,marginLeft:8}}>200 FR · 100 BK · 100 BR · 100 FL · 400 IM · max 1,000 each</div>
        </div>
        <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
          {imx.events.map(ev=>{
            const s = strokeOf(ev.ev);
            const e = SD.events.find(x=>x.ev===ev.ev);
            return (
              <div key={ev.ev} style={{display:'grid',gridTemplateColumns:'90px 1fr 52px 44px 80px',alignItems:'center',gap:12}}>
                <div style={{fontSize:12,fontWeight:600}}><StrokeDot stroke={s} size={7}/>{ev.ev}</div>
                <div style={{position:'relative',height:14,background:'#F3F4F6',border:'1px solid var(--line)'}}>
                  <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${(ev.pts/1000)*100}%`,background:SD.strokes[s]?.color||'#333',opacity:0.85}}/>
                </div>
                <div className="mono" style={{fontSize:14,textAlign:'right',fontWeight:600}}>{ev.pts}</div>
                <div className="mono muted" style={{fontSize:10,textAlign:'right'}}>{((ev.pts/1000)*100).toFixed(0)}%</div>
                <div className="mono" style={{fontSize:10,color:'var(--muted)',textAlign:'right'}}>{e?`PB ${fmtT(e.pb)}`:''}</div>
              </div>
            );
          })}
          <div style={{display:'grid',gridTemplateColumns:'90px 1fr 52px 44px 80px',alignItems:'center',gap:12,paddingTop:10,borderTop:'1px solid var(--line)'}}>
            <div style={{fontSize:12,fontWeight:700}}>TOTAL</div><div/>
            <div className="mono" style={{fontSize:16,textAlign:'right',fontWeight:700,color:'var(--signal)'}}>{imx.total.toLocaleString()}</div>
            <div className="mono muted" style={{fontSize:10,textAlign:'right'}}>{((imx.total/5000)*100).toFixed(0)}%</div>
            <div/>
          </div>
        </div>
      </div>

      {/* Milestone Targets */}
      {(() => {
        const milestones = [
          {score:3000, label:'3,000', desc:'Regionals qualifier range'},
          {score:4000, label:'4,000', desc:'Junior National contender'},
          {score:5000, label:'5,000', desc:'AAAA across all IMX events'},
        ].filter(m => m.score > imx.total);
        if (!milestones.length) return null;
        return (
          <div className="panel">
            <div style={{padding:'10px 14px',borderBottom:'1px solid var(--line)'}}>
              <div style={{fontWeight:700,fontSize:12}}>MILESTONE TARGETS</div>
              <div className="mono muted" style={{fontSize:10,marginTop:2}}>What it takes to reach each IMX milestone</div>
            </div>
            <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:16}}>
              {milestones.map(m=>{
                const ptsNeeded = m.score - imx.total;
                const ptsPerEvent = ptsNeeded / imx.events.length;
                return (
                  <div key={m.score}>
                    <div style={{display:'flex',alignItems:'baseline',gap:10,marginBottom:8}}>
                      <div className="mono" style={{fontSize:20,fontWeight:700,color:'var(--signal)'}}>{m.label}</div>
                      <div style={{fontSize:11,color:'var(--muted)'}}>{m.desc}</div>
                      <div style={{flex:1}}/>
                      <div className="mono" style={{fontSize:11,color:'var(--muted)'}}>+{ptsNeeded} pts needed</div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:6}}>
                      {imx.events.map(ev=>{
                        const e = SD.events.find(x=>x.ev===ev.ev);
                        if (!e) return null;
                        const targetPts = Math.min(1000, ev.pts + ptsPerEvent);
                        const cuts = e.cuts || {};
                        const tierKeys = ['B','BB','A','AA','AAA','AAAA'];
                        // Find B and AAAA cuts to interpolate target time
                        const bCut = cuts['B'], aaaaCut = cuts['AAAA'];
                        let targetTime = null;
                        if (bCut && aaaaCut) {
                          targetTime = bCut - (targetPts/1000) * (bCut - aaaaCut);
                        }
                        const s = strokeOf(ev.ev);
                        return (
                          <div key={ev.ev} style={{display:'grid',gridTemplateColumns:'90px 1fr 70px 80px',alignItems:'center',gap:12}}>
                            <div style={{fontSize:11,fontWeight:600}}><StrokeDot stroke={s} size={6}/>{ev.ev}</div>
                            <div style={{position:'relative',height:8,background:'#F3F4F6',border:'1px solid var(--line)'}}>
                              <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${(ev.pts/1000)*100}%`,background:SD.strokes[s]?.color||'#333',opacity:0.6}}/>
                              <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${(targetPts/1000)*100}%`,border:`2px solid ${SD.strokes[s]?.color||'#333'}`,background:'transparent'}}/>
                            </div>
                            <div className="mono" style={{fontSize:11,textAlign:'right',color:'var(--muted)'}}>
                              {ev.pts} → <span style={{fontWeight:700,color:'var(--ink)'}}>{Math.round(targetPts)}</span>
                            </div>
                            <div className="mono" style={{fontSize:11,textAlign:'right',color:'var(--signal)',fontWeight:600}}>
                              {targetTime ? `target ${fmtT(targetTime)}` : '—'}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}
    </div>
  );
};

        {steps.map((s,i) => (
          <div key={s.n} style={{display:'grid',gridTemplateColumns:'32px 1fr',gap:16,paddingBottom:24,position:'relative'}}>
            {i < steps.length-1 && <div style={{position:'absolute',left:15,top:32,bottom:0,width:2,background:'var(--line)'}}/>}
            <div style={{width:32,height:32,background:'var(--ink)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,flexShrink:0,zIndex:1}}>{s.n}</div>
            <div>
              <div style={{fontWeight:700,fontSize:14,marginTop:5}}>{s.title}</div>
              <div style={{marginTop:8,fontSize:12,color:'var(--ink-2)',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{s.body}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ─── Tab: Settings ────────────────────────────────────────────────────────────
const Settings = () => {
  const SD = useData();
  const fields = [
    ['Athlete name', SD.athlete.name],
    ['Age', SD.athlete.age],
    ['Team', SD.athlete.team],
    ['LSC', SD.athlete.lsc],
    ['Current season', SD.athlete.season],
    ['Data generated', SD.generatedAt?.slice(0,19).replace('T',' ') || '—'],
  ];
  return (
    <div style={{flex:1,overflow:'auto',padding:24,maxWidth:480}}>
      <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>Settings</div>
      <div className="mono muted" style={{fontSize:11,marginBottom:20}}>Athlete configuration — edit generate_data.py to change</div>
      <div className="panel">
        {fields.map(([k,v],i) => (
          <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:i<fields.length-1?'1px solid var(--line)':'none'}}>
            <div style={{fontSize:12,color:'var(--ink-2)'}}>{k}</div>
            <div className="mono" style={{fontSize:13,fontWeight:500}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:20,padding:'14px 16px',background:'var(--panel-alt)',border:'1px solid var(--line)',fontSize:12,color:'var(--ink-2)',lineHeight:1.7}}>
        To update athlete details, edit the config block at the top of <strong>generate_data.py</strong>, re-run it, and push.
      </div>
    </div>
  );
};

// ─── Shell ────────────────────────────────────────────────────────────────────
const Shell = ({ SD }) => {
  const [tab, setTab] = useState('Stroke Overview');
  const [openEv, setOpenEv] = useState(null);
  const [course, setCourse] = useState('SCY');
  const openEvent = (ev) => setOpenEv(ev);

  return (
    <DataCtx.Provider value={SD}>
      <div style={{flex:1,display:'flex',overflow:'hidden',position:'relative'}}>
        <SideNav active={tab} onSelect={t=>{setTab(t);setOpenEv(null);}}/>
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <TopBar title={tab} course={course} onCourse={setCourse}/>
          {tab==='Stroke Overview' && <StrokeOverview onEvent={openEvent} onTab={t=>{setTab(t);setOpenEv(null);}}/>}
          {tab==='Quick Lookup'    && <QuickLookup    onEvent={openEvent} course={course}/>}
          {tab==='Swim History'    && <SwimHistory     course={course}/>}
          {tab==='Deep Analytics'  && <DeepAnalytics  onEvent={openEvent}/>}
          {tab==='IMX Score'       && <IMXScore/>}
          {tab==='Goals'           && <Goals           onEvent={openEvent}/>}
          {tab==='Data Guide'      && <DataGuide/>}
          {tab==='Settings'        && <Settings/>}
        </div>
        {openEv && <EventDetail ev={openEv} onClose={()=>setOpenEv(null)} course={course}/>}
      </div>
    </DataCtx.Provider>
  );
};

// ─── App root — loads swim_data.json ─────────────────────────────────────────
const App = () => {
  const [SD, setSD] = useState(null);
  const [err, setErr] = useState(null);

  useEffect(() => {
    Promise.all([
      fetch('swim_data.json?v='+Date.now()).then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }),
      fetch('/api/live-swims').then(r => r.ok ? r.json() : []).catch(() => []),
    ]).then(([data, live]) => {
      data.tierIdx = k => data.tiers.findIndex(t => t.key === k);
      // Auto-dismiss live swims that now exist in official data (within 1s)
      const official = data.history || [];
      const stillPending = [];
      const toRemove = [];
      live.forEach(s => {
        const match = official.find(r =>
          r.date === s.date && r.event === s.event && Math.abs(r.time - s.time) < 1.0
        );
        if (match) toRemove.push(s.id);
        else stillPending.push(s);
      });
      toRemove.forEach(id => fetch('/api/live-swims/'+id, {method:'DELETE'}).catch(()=>{}));
      data.liveSwims = stillPending;
      setSD(data);
    }).catch(e => setErr(e.message));
  }, []);

  if (err) return (
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,fontFamily:'var(--sans)'}}>
      <div style={{fontWeight:700,fontSize:16,color:'var(--signal)'}}>Could not load swim_data.json</div>
      <div className="mono" style={{fontSize:12,color:'var(--muted)'}}>{err}</div>
      <div style={{fontSize:12,color:'var(--muted)'}}>Run <code>python generate_data.py</code> then refresh.</div>
    </div>
  );

  if (!SD) return (
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,fontFamily:'var(--sans)'}}>
      <div style={{width:32,height:32,border:'3px solid var(--line)',borderTop:'3px solid var(--signal)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <div style={{fontSize:12,color:'var(--muted)'}}>Loading swim data…</div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return <Shell SD={SD}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
